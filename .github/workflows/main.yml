name: CI-Diabetes-Prediction-Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Source Code Repo
        uses: actions/checkout@v3

      - name: Konfigurasi Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn requests waitress

      # Langkah 1: Jalankan training (Kriteria 2)
      - name: Run Training Python
        working-directory: ./Workflow-CI/MLProject
        run: |
          python modelling.py

      # Langkah 2 & 3: JALANKAN SERVING & HIT SECARA OTOMATIS (MENCETAK LOG WAITRESS ASLI)
      - name: Start MLflow Serving and Hit Endpoint
        working-directory: ./Workflow-CI/MLProject
        run: |
          # 1. Cari RUN_ID hasil training secara otomatis
          RUN_ID=$(ls -d mlruns/0/*/ | head -n 1 | xargs -n 1 basename)
          echo "Menemukan RUN_ID Terkini: $RUN_ID"
          
          # 2. Cari folder asli yang mengandung file MLmodel (Bukan file HTML!)
          NAMA_FOLDER=$(find mlruns/0/$RUN_ID/artifacts/ -name "MLmodel" -exec dirname {} \; | xargs basename)
          echo "Nama folder model resmi yang valid: $NAMA_FOLDER"
          
          # 3. Jalankan server menggunakan path folder model yang sebenarnya
          mlflow models serve -m "mlruns/0/$RUN_ID/artifacts/$NAMA_FOLDER" --host 127.0.0.1 --port 5002 --no-conda &
          
          # 4. Beri jeda 15 detik agar LOG ASLI WAITRESS tercetak utuh
          echo "Menunggu server Waitress memuat model..."
          sleep 15
          
          # 5. Jalankan script inference untuk menembak data riil
          python inference.py
          
          # 6. MATIKAN SERVER SECARA PAKSA AGAR WORKFLOW GAK MACET
          echo "--> Membersihkan proses background..."
