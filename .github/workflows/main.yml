name: CI-Diabetes-Prediction-Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Source Code Repo
        uses: actions/checkout@v4

      - name: Konfigurasi Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn requests waitress

      # Langkah 1: Jalankan training (Kriteria 2)
      - name: Run Training Python
        working-directory: ./Workflow-CI/MLProject
        run: |
          python modelling.py

      # Langkah 2 & 3: JALANKAN SERVING & HIT SECARA OTOMATIS
      - name: Start MLflow Serving and Hit Endpoint
        working-directory: ./Workflow-CI/MLProject
        run: |
          # 1. Cari RUN_ID hasil training secara otomatis
          RUN_ID=$(ls -d mlruns/0/*/ | head -n 1 | xargs -n 1 basename)
          echo "Menemukan RUN_ID Terkini: $RUN_ID"
          
          # 2. Cari path absolut folder yang BERISI file MLmodel (Bukan file HTML!)
          PATH_MODEL=$(find mlruns/0/$RUN_ID/artifacts/ -name "MLmodel" -exec dirname {} \;)
          echo "Path folder model resmi yang valid: $PATH_MODEL"
          
          # 3. Jalankan server menggunakan path folder yang valid tersebut
          mlflow models serve -m "$PATH_MODEL" --host 127.0.0.1 --port 5002 --no-conda &
          
          # 4. Beri jeda 15 detik agar LOG ASLI WAITRESS tercetak utuh di layar
          echo "Menunggu server Waitress memuat model..."
          sleep 15
          
          # 5. Jalankan script inference untuk menembak data riil
          python inference.py
          
          # 6. MATIKAN SERVER SECARA PAKSA AGAR WORKFLOW GAK MACET
          echo "--> Membersihkan proses background..."
          pkill -f "mlflow models serve" || true

      # Langkah 4: Build Docker Image
      - name: Build Docker Image
        run: |
          echo -e "FROM python:3.10-slim\nRUN pip install mlflow scikit-learn pandas numpy matplotlib requests\nCOPY . /app\nWORKDIR /app" > Dockerfile
          docker build -t reginaa04/model-sml:latest .

      # Langkah 5: Push ke Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          echo "Push Sukses ke Docker Hub reginaa04!"
