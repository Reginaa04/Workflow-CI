name: CI-Diabetes-Prediction-Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Source Code Repo
        uses: actions/checkout@v3

      - name: Konfigurasi Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn requests waitress

      # Langkah 1: Jalankan training (Menghasilkan artefak model di mlruns/0/)
      - name: Run Training Python
        working-directory: ./Workflow-CI/MLProject
        run: |
          python modelling.py

      # Langkah 2: MENJALANKAN MLFLOW MODELS SERVE SEPERTI REKOMENDASI REVIEWER
      - name: Start MLflow Model Serving
        working-directory: ./Workflow-CI/MLProject
        run: |
          mlflow models serve -m "mlruns/0/" --port 5002 --no-conda &
          echo "Menunggu server MLflow Serve up dan siap menerima request..."
          sleep 15

      # Langkah 3: Eksekusi API hit menggunakan data riil via inference.py
      - name: Run Inference (Hit Endpoint)
        working-directory: ./Workflow-CI/MLProject
        run: |
          python inference.py

      # Langkah 4: Build Docker Image sesuai kriteria kelulusan
      - name: Build Docker Image
        run: |
          echo -e "FROM python:3.10-slim\nRUN pip install mlflow scikit-learn pandas numpy matplotlib requests\nCOPY . /app\nWORKDIR /app" > Dockerfile
          docker build -t reginaa04/model-sml:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          echo "Push Sukses ke Docker Hub reginaa04!"
