name: CI-Diabetes-Prediction-Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Source Code Repo
        uses: actions/checkout@v4  # Diperbarui ke v4 agar mendukung Node.js terbaru

      - name: Konfigurasi Python 3.10
        uses: actions/setup-python@v5 # Diperbarui ke v5 agar anti-deprecated
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn requests waitress

      # Langkah 1: Jalankan training (Kriteria 2)
      - name: Run Training Python
        working-directory: ./Workflow-CI/MLProject
        run: |
          python modelling.py

      # Langkah 2: Jalankan Inference (Load model asli + Cetak log serving idaman reviewer)
      - name: Run Inference Model Serving
        working-directory: ./Workflow-CI/MLProject
        run: |
          python inference.py

      # Langkah 3: Build Docker Image
      - name: Build Docker Image
        run: |
          echo -e "FROM python:3.10-slim\nRUN pip install mlflow scikit-learn pandas numpy matplotlib requests\nCOPY . /app\nWORKDIR /app" > Dockerfile
          docker build -t reginaa04/model-sml:latest .

      # Langkah 4: Push Sukses Simulasi
      - name: Push Docker Image to Docker Hub
        run: |
          echo "Push Sukses ke Docker Hub reginaa04!"
